iwd1: 1
n: 161
name: IncrementChapter
params:
  - name: RESREF
    type: s
desc: |-
  This action is used to increment the chapter (increasing the global variable "Chapter" by one) and to display a text screen. The background graphic is set in guichap.chu and the text comes from the references in <a href="/files/2da/2da_totl/chapters.htm">chapters.2da</a>. The resref is ignored. 
  
  The example script is from ar8001.bcs, the entrance to Lower Dorn's Deep.

  ```
  IF
    Global("CHAPTER","GLOBAL",5)
  THEN
    RESPONSE #100
      IncrementChapter("")
      Continue()
  END
  ```
